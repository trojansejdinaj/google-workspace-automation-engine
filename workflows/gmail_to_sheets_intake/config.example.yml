workflow:
  name: gmail_to_sheets_intake

gmail:
  gmail_query: 'newer_than:7d -in:chats -category:social'
  labels:
    success: 'gw/processed'
    needs_review: 'gw/needs-review'
    error: 'gw/error'

sheets:
  sheet_id: 'DUMMY_SHEET_ID'
  tabs:
    triage_tab: 'triage'
  defaults:
    status: 'NEW'

options:
  max_messages: 25
  min_confidence: 0.6
  archive_on_success: false
  archive_on_failure: false

attachments:
  enabled: false
  max_size_bytes: 5242880
  allowed_mime_types:
    - "application/pdf"
    - "image/jpeg"
    - "image/png"
  allowed_extensions:
    - ".pdf"
    - ".jpg"
    - ".png"
  route_mode: "artifacts"
  drive_folder_id: ""
